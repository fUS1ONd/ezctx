<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Слух — расшифровка аудио · Liquid Glass</title>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<link rel="stylesheet" href="styles.css">

<style>
  html, body, #root {
    margin: 0; padding: 0; height: 100%;
    background: #ece8e0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="glass.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<script type="text/babel">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "dark": false,
    "radius": 36
  }/*EDITMODE-END*/;

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const screens = [
      { id: "empty",    label: "1 · Загрузка",    width: 390, height: 844, render: () => <ScreenEmpty    dark={t.dark} radius={t.radius} /> },
      { id: "process",  label: "2 · Процесс",     width: 390, height: 844, render: () => <ScreenProcess  dark={t.dark} radius={t.radius} /> },
      { id: "history",  label: "3 · История",     width: 390, height: 844, render: () => <ScreenHistory  dark={t.dark} radius={t.radius} /> },
      { id: "detail",   label: "4 · Расшифровка", width: 390, height: 844, render: () => <ScreenDetail   dark={t.dark} radius={t.radius} /> },
      { id: "error",    label: "5 · Ошибка",      width: 390, height: 844, render: () => <ScreenError    dark={t.dark} radius={t.radius} /> },
    ];
    const settings = [
      { id: "settings", label: "6 · Настройки",   width: 390, height: 844, render: () => <ScreenSettings dark={t.dark} radius={t.radius} /> },
      { id: "apikeys",  label: "7 · API-ключи",   width: 390, height: 844, render: () => <ScreenApiKeys  dark={t.dark} radius={t.radius} /> },
    ];

    return (
      <>
        <DesignCanvas>
          <DCSection id="flow" title="Слух — основной флоу"
            subtitle="Загрузка → распознавание → готовая расшифровка, плюс ошибка">
            {screens.map(s => (
              <DCArtboard key={s.id} id={s.id} label={s.label} width={s.width} height={s.height}>
                {s.render()}
              </DCArtboard>
            ))}
          </DCSection>

          <DCSection id="settings" title="Настройки"
            subtitle="Главная страница настроек + страница API-ключей (Groq)">
            {settings.map(s => (
              <DCArtboard key={s.id} id={s.id} label={s.label} width={s.width} height={s.height}>
                {s.render()}
              </DCArtboard>
            ))}
          </DCSection>
        </DesignCanvas>

        <TweaksPanel>
          <TweakSection label="Тема" />
          <TweakRadio label="Оформление" value={t.dark ? "тёмная" : "светлая"}
            options={["светлая", "тёмная"]}
            onChange={(v) => setTweak("dark", v === "тёмная")} />

          <TweakSection label="Скругления" />
          <TweakSlider label="Радиус карточек" value={t.radius}
            min={8} max={36} step={1} unit="px"
            onChange={(v) => setTweak("radius", v)} />
        </TweaksPanel>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

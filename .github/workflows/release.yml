name: Release APK

# Триггерится только на push тега вида v* (например, v0.1.0).
# Собирает подписанные release-APK с разбивкой по ABI и публикует GitHub Release.
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # нужно для создания Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.32.1'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "${RUNNER_TEMP}/release.jks"
          echo "KEYSTORE_PATH=${RUNNER_TEMP}/release.jks" >> "$GITHUB_ENV"

      - name: Build release APK (split per ABI)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs with version
        run: |
          TAG="${GITHUB_REF_NAME}"
          cd build/app/outputs/flutter-apk
          for f in app-*-release.apk; do
            mv "$f" "ezctx-${TAG}-${f#app-}"
          done
          ls -lh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/ezctx-*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true

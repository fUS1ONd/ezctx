name: Build APK

on:
  push:
    branches: [main, 'perf/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        renderer: [impeller, skia]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.32.1'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test (skip goldens — хост-агностичные не гарантируем в CI)
        run: flutter test --exclude-tags=golden

      # Для Skia-варианта переключаем meta-data EnableImpeller на false.
      # Impeller-вариант оставляет AndroidManifest как есть (EnableImpeller=true).
      - name: Disable Impeller in AndroidManifest (skia variant)
        if: matrix.renderer == 'skia'
        run: |
          python3 <<'PY'
          import re, pathlib
          p = pathlib.Path('android/app/src/main/AndroidManifest.xml')
          s = p.read_text()
          new = re.sub(
              r'(android:name="io\.flutter\.embedding\.android\.EnableImpeller"\s+android:value=)"true"',
              r'\1"false"',
              s,
          )
          assert new != s, 'EnableImpeller meta-data not found / not replaced'
          p.write_text(new)
          print('--- Patched AndroidManifest.xml ---')
          print(new)
          PY

      - name: Build Profile APK
        run: flutter build apk --profile

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-profile.apk \
             artifacts/ezctx-profile-${{ matrix.renderer }}-${{ github.sha }}.apk

      - name: Upload Profile APK
        uses: actions/upload-artifact@v4
        with:
          name: ezctx-profile-${{ matrix.renderer }}-${{ github.sha }}
          path: artifacts/ezctx-profile-${{ matrix.renderer }}-${{ github.sha }}.apk
          retention-days: 14

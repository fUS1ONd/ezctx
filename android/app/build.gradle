plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// Релизный keystore берётся из env-переменных (CI), либо из android/key.properties (локально).
// Если ни того, ни другого нет — fallback на debug, чтобы не ломать локальный flutter run --release.
def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def envStoreFile = System.getenv("KEYSTORE_PATH")
def envStorePassword = System.getenv("KEYSTORE_PASSWORD")
def envKeyAlias = System.getenv("KEY_ALIAS")
def envKeyPassword = System.getenv("KEY_PASSWORD")

def hasReleaseSigning =
    (envStoreFile != null && envStorePassword != null && envKeyAlias != null && envKeyPassword != null) ||
    keystoreProperties.getProperty("storeFile") != null

android {
    namespace = "com.ezctx.app"
    compileSdk = 36
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.ezctx.app"
        minSdk = 24
        targetSdk = 36
        versionCode = 2
        versionName = "0.1.1"
    }

    sourceSets {
        main.kotlin.srcDirs += 'src/main/kotlin'
    }

    signingConfigs {
        if (hasReleaseSigning) {
            release {
                storeFile = envStoreFile != null
                    ? file(envStoreFile)
                    : file(keystoreProperties.getProperty("storeFile"))
                storePassword = envStorePassword ?: keystoreProperties.getProperty("storePassword")
                keyAlias = envKeyAlias ?: keystoreProperties.getProperty("keyAlias")
                keyPassword = envKeyPassword ?: keystoreProperties.getProperty("keyPassword")
            }
        }
    }

    buildTypes {
        release {
            signingConfig = hasReleaseSigning ? signingConfigs.release : signingConfigs.debug
            // R8 включён, но с keep-rules для ffmpeg-kit (JNI ломается без них — Bad JNI version).
            minifyEnabled = true
            shrinkResources = true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source = "../.."
}

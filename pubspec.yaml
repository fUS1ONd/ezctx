name: ezctx
description: "Расшифровка аудио в текст на Android через Groq Whisper и Deepgram nova-3"
publish_to: 'none'
version: 0.4.0+5

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  clock: ^1.1.1
  drift: ^2.31.0
  sqlite3: ^2.0.0
  sqlite3_flutter_libs: ^0.5.0
  http: ^1.4.0
  file_picker: ^11.0.2
  flutter_secure_storage: ^10.2.0
  ffmpeg_kit_flutter_new: ^4.1.0
  path: ^1.9.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  super_clipboard: ^0.9.1
  share_plus: ^10.0.0
  flutter_riverpod: ^2.6.1
  synchronized: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  drift_dev: ^2.31.0
  build_runner: ^2.15.0
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  # Fallback-иконка для старых Android (<8.0) без адаптивных иконок
  image_path_android: "assets/icon/icon-day.png"
  # Адаптивная иконка для Android 8.0+ (API 26+)
  adaptive_icon_foreground: "assets/icon/icon-foreground-day.png"
  adaptive_icon_background: "assets/icon/icon-background-day.png"
  # Иконка для уведомлений (монохромная, Android 13+)
  adaptive_icon_monochrome: "assets/icon/icon-foreground-day.png"
